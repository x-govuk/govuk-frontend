params:
  - name: titleText
    type: string
    required: true
    description: If `titleHtml` is set, this is not required. Text to use within the panel. If `titleHtml` is provided, the `titleText` option will be ignored.
  - name: titleHtml
    type: string
    required: true
    description: If `titleText` is set, this is not required. HTML to use within the panel. If `titleHtml` is provided, the `titleText` option will be ignored.
  - name: headingLevel
    type: integer
    required: false
    description: Heading level, from `1` to `6`. Default is `1`.
  - name: text
    type: string
    required: true
    description: If `html` is set, this is not required. Text to use within the panel content. If `html` is provided, the `text` option will be ignored.
  - name: html
    type: string
    required: true
    description: If `text` is set, this is not required. HTML to use within the panel content. If `html` is provided, the `text` option will be ignored.
  - name: caller
    type: nunjucks-block
    required: false
    description: Not strictly a parameter but [Nunjucks code convention](https://mozilla.github.io/nunjucks/templating.html#call). Using a `call` block enables you to call a macro with all the text inside the tag. This is helpful if you want to pass a lot of content into a macro. To use it, you will need to wrap the entire panel component in a `call` block.
  - name: classes
    type: string
    required: false
    description: Classes to add to the panel container.
  - name: attributes
    type: object
    required: false
    description: HTML attributes (for example data attributes) to add to the panel container.
  - name: actions
    type: object
    required: false
    description: Can be used when creating an [interruption panel](https://design-system.service.gov.uk/components/panel/#interruption-panel) which will add a button or link. Default is `button` unless you set `href` which will show the action as a link.
    params:
      - name: items
        type: array
        required: false
        description: The list of buttons or links to display at the end of an Interruption panel.
        params:
          - name: text
            type: string
            required: true
            description: The button or link text.
          - name: type
            type: string
            required: false
            description: The type of button – `"button"` or `"submit"`. If `href` is provided, set `type` to `"button"` render a link styled as a button.
          - name: href
            type: string
            required: false
            description: The `href` for a link. Set `type` to `"button"` and set `href` to render a link styled as a button.
          - name: classes
            type: string
            required: false
            description: The additional classes that you want to add to the button or link.
          - name: attributes
            type: object
            required: false
            description: The additional attributes that you want to add to the button or link. For example, data attributes.
      - name: classes
        type: string
        required: false
        description: The additional classes that you want to add to the `govuk-panel__actions` element that wraps the buttons or links.
      - name: attributes
        type: object
        required: false
        description: The additional attributes that you want to add to the `govuk-panel__actions` element that wraps the buttons or links. For example, data attributes.

examples:
  - name: default
    screenshot: true
    options:
      titleHtml: Application complete
      html: Your reference number<br><strong>HDJ2123F</strong>
  - name: interruption
    options:
      classes: govuk-panel--interruption
      titleText: Is your age correct?
      html: |
        <p class="govuk-body">You entered your age as <strong>109</strong>.</p>
      actions:
        items:
          - text: Yes, this is correct
            type: button
          - text: No, change my age
            href: '#'
  - name: interruption-with-content-with-long-line-length
    options:
      classes: govuk-panel--interruption
      titleText: Are you sure you want to change this?
      html: |
        <p class="govuk-body">You've changed the person's address from Wales to England. This means that the referral needs to be cancelled.</p>
        <p class="govuk-body">Previous home address: 1 Willow Lane, Newchurch, Kington, HR5 3QF</p>
        <p class="govuk-body">New home address: 9 Elm Street, Whitney-on-Wye, Hereford, HR3 6EH</p>
        <p class="govuk-body">You can go back to undo this change.</p>
      actions:
        items:
          - text: Are you sure you want to change this?
            type: submit
            attributes:
              form: the-form-id
          - text: Go back to application
            href: '#'
  - name: interruption-with-headings-content-and-lists
    options:
      classes: govuk-panel--interruption
      titleText: Your new answer affects other sections of this application
      html: |
        <h2 class="govuk-heading-m">Question: Where is Andy Cooke located?</h2>
        <p class="govuk-body">
          Previous answer: Custody<br>
          New answer: Released
        </p>
        <p class="govuk-body govuk-!-margin-bottom-2">You need to:</p>
        <ul class="govuk-list govuk-list--bullet">
          <li>enter their custody information</li>
          <li>update the licence conditions section</li>
        </ul>
      actions:
        - text: Continue to other sections
          type: submit
        - text: Go back to application
          href: '#'
  # Hidden examples are not shown in the review app, but are used for tests and HTML fixtures
  - name: title html as text
    hidden: true
    options:
      titleText: Application <strong>not</strong> complete
      text: Please complete form 1
  - name: title html
    hidden: true
    options:
      titleHtml: Application <strong>not</strong> complete
      html: Please complete <strong>form 1</strong>
  - name: body html as text
    hidden: true
    options:
      titleText: Application complete
      text: Your reference number<br><strong>HDJ2123F</strong>
  - name: body html
    hidden: true
    options:
      titleText: Application complete
      html: Your reference number<br><strong>HDJ2123F</strong>
  - name: classes
    hidden: true
    options:
      titleText: Application complete
      text: Your reference number is HDJ2123F
      classes: extra-class one-more-class
  - name: attributes
    hidden: true
    options:
      titleText: Application complete
      text: Your reference number is HDJ2123F
      attributes:
        first-attribute: foo
        second-attribute: bar
  - name: title with no body text
    hidden: true
    options:
      titleText: Application complete
  - name: custom heading level
    hidden: true
    options:
      titleText: Application complete
      headingLevel: 2
      text: 'Your reference number: HDJ2123F'
  - name: interruption with custom classes
    hidden: true
    options:
      classes: govuk-panel--interruption extra-class one-more-class
      titleText: Are you sure you want to change this?
      html: <p class="govuk-body">You've changed the person's address from Wales to England. This means that the referral needs to be cancelled.</p>
  - name: confirmation, with actions
    hidden: true
    options:
      titleText: Is your age correct?
      actions:
        items:
          - type: button
            text: Yes, this is correct
          - href: '#'
            text: No, change my age
  - name: interruption, with actions classes and attributes
    hidden: true
    options:
      classes: govuk-panel--interruption
      titleText: Is your age correct?
      html: |
        <p class="govuk-body">You entered your age as <strong>109</strong>.</p>
      actions:
        classes: extra-class one-more-class
        attributes:
          'data-test': 1
          'data-other-test': 'yes'
        items:
          - type: button
            text: Yes, this is correct
          - href: '#'
            text: No, change my age
  - name: interruption, submit action
    hidden: true
    options:
      classes: govuk-panel--interruption
      titleText: Is your age correct?
      html: |
        <p class="govuk-body">You entered your age as <strong>109</strong>.</p>
      actions:
        items:
          - type: submit
            text: Yes, this is correct
            attributes:
              form: test-target-element
              name: 'acknowledged'
              value: ''
            classes: 'extra-class one-more-class'
          - href: '#'
            text: No, change my age
  - name: interruption, button link
    hidden: true
    options:
      classes: govuk-panel--interruption
      titleText: Is your age correct?
      html: |
        <p class="govuk-body">You entered your age as <strong>109</strong>.</p>
      actions:
        classes: extra-class one-more-class
        attributes:
          'data-test': 1
          'data-other-test': 'yes'
        items:
          - type: button
            text: Yes, this is correct
            href: '?acknowledged=true'
          - href: '#'
            text: No, change my age
  - name: interruption, no actions
    hidden: true
    options:
      classes: govuk-panel--interruption
      titleText: Is your age correct?
      html: |
        <p class="govuk-body">You entered your age as <strong>109</strong>.</p>
  - name: interruption, no actions items
    hidden: true
    options:
      classes: govuk-panel--interruption
      titleText: Is your age correct?
      html: |
        <p class="govuk-body">You entered your age as <strong>109</strong>.</p>
      actions:
        classes: 'extra-class'
